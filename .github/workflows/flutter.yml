name: Flutter CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  flutter-version: '3.38.3'
  java-version: '17'

jobs:
  # ===========================================
  # Android 构建
  # ===========================================
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.java-version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android/app/release.jks

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ===========================================
  # iOS 构建 (macOS only)
  # ===========================================
  ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get iOS dependencies
        run: |
          cd ios && pod install && cd ..

      - name: Build iOS (Simulator)
        run: flutter build ios --simulator --no-codesign

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphonesimulator/
          retention-days: 7

  # ===========================================
  # macOS 构建
  # ===========================================
  macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get macOS dependencies
        run: |
          cd macos && pod install && cd ..

      - name: Build macOS
        run: flutter build macos

      - name: Prepare app bundle for non-notarized distribution
        run: |
          APP_PATH="build/macos/Build/Products/Release/Metronome.app"

          # 移除所有扩展属性 (com.apple.quarantine 等)
          xattr -cr "$APP_PATH"

          # 确保二进制文件有执行权限
          chmod +x "$APP_PATH/Contents/MacOS/Metronome"

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/Metronome.app"
          DMG_PATH="metronome.dmg"
          VOL_NAME="Metronome"

          # Create a temporary DMG
          hdiutil create -volname "$VOL_NAME" -srcfolder "$APP_PATH" -o "$DMG_PATH" -ov -format UDZO

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            metronome.dmg
          retention-days: 7

  # ===========================================
  # Windows 构建
  # ===========================================
  windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Build MSI
        shell: pwsh
        run: |
          # 安装并刷新路径
          dotnet tool install --global wix --version 5.0.0
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"

          # 自动定位 Release 路径并转为绝对路径（防止 WiX 找不到文件）
          $relPath = "build\windows\x64\runner\Release"
          if (!(Test-Path $relPath)) { $relPath = "build\windows\runner\Release" }
          $fullPath = (Resolve-Path $relPath).Path

          # 复制 icon 到 SourceDir（WiX 需要在 SourceDir 中找到 icon 文件）
          Copy-Item "windows\runner\resources\app_icon.ico" -Destination "$fullPath" -Force

          # 执行构建
          & wix build windows\Package.wxs `
            -d SourceDir="$fullPath" `
            -arch x64 `
            -o metronome.msi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            metronome.msi
          retention-days: 7

  # ===========================================
  # 部署到 GitHub Release
  # ===========================================
  deploy:
    name: Deploy to GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, macos, windows]
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release_dist

          # 1. Android - 搜索 apk 并复制
          find artifacts -name "app-release.apk" -exec cp {} release_dist/metronome-android.apk \;

          # 2. Windows - 搜索 MSI
          find artifacts -name "metronome.msi" -exec cp {} release_dist/metronome-windows.msi \;

          # 3. macOS - 搜索 DMG
          find artifacts -name "metronome.dmg" -exec cp {} release_dist/metronome-macos.dmg \;

          # 4. iOS - 压缩 iphonesimulator 目录
          IOS_DIR=$(find artifacts -type d -name "iphonesimulator" | head -1)
          if [ -n "$IOS_DIR" ]; then
            (cd "$IOS_DIR" && zip -r ../../release_dist/metronome-ios-simulator.zip .)
          fi

          ls -R release_dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'latest-dev' || github.ref_name }}
          name: Metronome Release ${{ github.ref == 'refs/heads/main' && 'latest-dev' || github.ref_name }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          generate_release_notes: true
          files: release_dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
