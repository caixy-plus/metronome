name: Flutter CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  flutter-version: '3.38.3'
  java-version: '17'

jobs:
  # ===========================================
  # Android 构建
  # ===========================================
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.java-version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android/app/release.jks

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ===========================================
  # iOS 构建 (macOS only)
  # ===========================================
  ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get iOS dependencies
        run: |
          cd ios && pod install && cd ..

      - name: Build iOS (Simulator)
        run: flutter build ios --simulator --no-codesign

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphonesimulator/
          retention-days: 7

  # ===========================================
  # macOS 构建
  # ===========================================
  macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get macOS dependencies
        run: |
          cd macos && pod install && cd ..

      - name: Build macOS
        run: flutter build macos

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/Metronome.app"
          DMG_PATH="metronome.dmg"
          VOL_NAME="Metronome"

          # Create a temporary DMG
          hdiutil create -volname "$VOL_NAME" -srcfolder "$APP_PATH" -o "$DMG_PATH" -ov -format UDZO

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            metronome.dmg
          retention-days: 7

  # ===========================================
  # Windows 构建
  # ===========================================
  windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Setup WiX
        run: dotnet tool install --global wix --version 5.0.0

      - name: Build MSI
        run: |
          $releasePath = "build\windows\x64\runner\Release"
          if (!(Test-Path $releasePath)) { $releasePath = "build\windows\runner\Release" }
          # dotnet tools 安装路径需要显式添加到 PATH
          $env:PATH = "$env:PATH;$env:USERPROFILE\.dotnet\tools"
          & "$env:USERPROFILE\.dotnet\tools\wix.exe" build windows\Package.wxs -ext WixToolset.UI.wixext -d SourceDir="$releasePath" -o metronome.msi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            metronome.msi
          retention-days: 7

  # ===========================================
  # 部署到 GitHub Release
  # ===========================================
  deploy:
    name: Deploy to GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, macos, windows]
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release_dist

          # Android - 直接复制 APK 文件
          APK_FILE=$(find artifacts -name "app-release.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" release_dist/metronome-android.apk
          fi

          # iOS - 优先使用现成的 zip 文件，否则从目录创建
          IOS_ZIP=$(find artifacts -name "*.zip" -path "*ios*" -type f 2>/dev/null | head -1)
          if [ -n "$IOS_ZIP" ]; then
            cp "$IOS_ZIP" release_dist/metronome-ios-simulator.zip
          else
            IOS_DIR=$(find artifacts -type d -name "iphonesimulator" 2>/dev/null | head -1)
            if [ -n "$IOS_DIR" ]; then
              cd "$IOS_DIR" && zip -r ../../release_dist/metronome-ios-simulator.zip . && cd ../..
            fi
          fi

          # macOS - 优先使用现成的 .dmg 文件
          DMG_FILE=$(find artifacts -name "*.dmg" -type f 2>/dev/null | head -1)
          if [ -n "$DMG_FILE" ]; then
            cp "$DMG_FILE" release_dist/metronome-macos.dmg
          fi

          # Windows - 优先使用现成的 .msi 文件
          MSI_FILE=$(find artifacts -name "*.msi" -type f 2>/dev/null | head -1)
          if [ -n "$MSI_FILE" ]; then
            cp "$MSI_FILE" release_dist/metronome-windows.msi
          fi

          echo "=== Release files ==="
          ls -la release_dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'latest-dev' || github.ref_name }}
          name: Metronome Release ${{ github.ref == 'refs/heads/main' && 'latest-dev' || github.ref_name }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          generate_release_notes: true
          files: release_dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
