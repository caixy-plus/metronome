name: Flutter CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  flutter-version: '3.38.3'
  java-version: '17'

jobs:
  # ===========================================
  # Android 构建
  # ===========================================
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.java-version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android/app/release.jks

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ===========================================
  # iOS 构建 (macOS only)
  # ===========================================
  ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get iOS dependencies
        run: |
          cd ios && pod install && cd ..

      - name: Build iOS (Simulator)
        run: flutter build ios --simulator --no-codesign

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphonesimulator/
          retention-days: 7

  # ===========================================
  # macOS 构建
  # ===========================================
  macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get macOS dependencies
        run: |
          cd macos && pod install && cd ..

      - name: Build macOS
        run: flutter build macos

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/
          retention-days: 7

  # ===========================================
  # Windows 构建
  # ===========================================
  windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/runner/Release/
          retention-days: 7

  # ===========================================
  # 部署到 GitHub Release
  # ===========================================
  deploy:
    name: Deploy to GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, macos, windows]
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release_dist
          # Android
          if [ -f artifacts/android-apks/app-release.apk ]; then
            mv artifacts/android-apks/app-release.apk release_dist/metronome-android.apk
          fi
          # iOS (must zip)
          if [ -d artifacts/ios-build ]; then
            cd artifacts/ios-build && zip -r ../../release_dist/metronome-ios-simulator.zip . && cd ../..
          fi
          # macOS
          if [ -d artifacts/macos-build ]; then
            cd artifacts/macos-build && zip -r ../../release_dist/metronome-macos.zip . && cd ../..
          fi
          # Windows
          if [ -d artifacts/windows-build ]; then
            cd artifacts/windows-build && zip -r ../../release_dist/metronome-windows.zip . && cd ../..
          fi
          ls -la release_dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Metronome Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release_dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
